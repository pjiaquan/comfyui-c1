name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed if ever pushing to GHCR; harmless for Docker Hub

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # Buildx must be set up before login so the builder is ready
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          # Disable provenance attestation – avoids OCI index push errors on Docker Hub free tier
          provenance: false
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-cu124:wan
            ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-cu124:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
